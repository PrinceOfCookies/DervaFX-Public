name: DervaFX Package Builder

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          server-id: github
          settings-path: ${{ github.workspace }}
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Read project version
        id: version
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        id: package
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          set +e
          mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}
          STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$STATUS" -ne 0 ]; then
            if grep -Eq "status code: 422|Unprocessable Entity" /tmp/maven-deploy.log; then
              echo "::notice::Still on the same version: v$VERSION"
              echo "published=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit "$STATUS"
          fi
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.package.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "::notice::Still on the same version: v$VERSION"
            exit 0
          fi
          gh release create "v$VERSION" "target/dervafx-$VERSION.jar" --title "v$VERSION" --generate-notes
