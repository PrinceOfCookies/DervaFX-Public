name: DervaFX Package Builder

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          server-id: github
          settings-path: ${{ github.workspace }}
          cache: maven

      - name: Read project version
        id: version
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          PACKAGE_NAME="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.artifactId)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Check existing package version
        id: package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_NAME="${{ steps.version.outputs.package_name }}"
          if gh api "/user/packages/maven/$PACKAGE_NAME/versions" >/tmp/package_versions.json 2>/dev/null; then
            if jq -e --arg version "$VERSION" '.[] | select(.name == $version)' /tmp/package_versions.json >/dev/null; then
              echo "::notice::Still on the same version: v$VERSION"
              echo "exists=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "::notice::Still on the same version: v$VERSION"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Publish to GitHub Packages
        if: steps.package.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: mvn -B deploy -s "$GITHUB_WORKSPACE/settings.xml" -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}

      - name: Create GitHub release
        if: steps.package.outputs.exists != 'true' && steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" \
            "target/dervafx-$VERSION.jar" \
            --title "v$VERSION" \
            --generate-notes
